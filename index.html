<!DOCTYPE html>
<html>
<head>
    <title>我的普通小网站</title>
    <style>
        body {
            background-color: #f5f5f5; 
            font-family: 微软雅黑, sans-serif; 
            margin: 0;
            padding: 50px;
            text-align: center;
        }
        .box {
            background: white; 
            padding: 30px;
            border-radius: 10px; 
            box-shadow: 0 0 10px #ddd; 
            max-width: 600px;
            margin: 0 auto 20px;
        }
        h1 {
            color: #333;
            font-size: 28px;
        }
        p {
            color: #666;
            font-size: 16px;
            line-height: 1.6;
        }
        textarea {
            width: 500px; 
            height: 300px; 
            font-size: 18px;
        }
        #pwd{
            padding:12px;
            width:260px;
            font-size:18px;
            margin-right:10px;
        }
        button{
            padding:10px 18px;
            font-size:16px;
            cursor:pointer;
            margin:3px;
        }
        select{
            padding:8px;
            font-size:16px;
            width:220px;
        }
        #secretPage{
            display:none;
        }
    </style>
</head>
<body>

<div id="mainPage">
    <div class="box">
        <h1>欢迎来到我的网站！</h1>
        <p>这是我做的第一个网站。</p>
        <p>你可以在这里写任何你想写的话，比如你的爱好、你的日常。</p>
    </div>

    <div class="box">
        <textarea placeholder="你在这里可以打字"></textarea>
    </div>

    <div class="box">
        <p>输入密码进入秘密网页</p>
        <input type="password" id="pwd" placeholder="请输入密码">
        <button onclick="showPwd()">显示/隐藏</button>
        <button onclick="checkPwd()">进入秘密页</button>
    </div>
</div>

<div id="secretPage">
    <div class="box">
        <h1>🔐 多本秘密日记</h1>
        <p>可以写很多篇，分开保存，随时切换看</p>
        <br>
        <select id="diarySelect" onchange="switchDiary()">
            <option value="">请选择日记查看</option>
        </select>
        <br><br>
        <button onclick="newDiary()">新建一篇日记</button>
    </div>

    <div class="box">
        <textarea id="diary" placeholder="在这里写你的秘密日记"></textarea>
    </div>

    <div class="box">
        <button onclick="saveCurrentDiary()">保存当前日记</button>
        <button onclick="backMain()">退出返回第一个网站</button>
    </div>
</div>

<script>
let nowId = -1;

function showPwd(){
    let i=document.getElementById("pwd");
    i.type=i.type=="password"?"text":"password";
}

function checkPwd(){
    let p=document.getElementById("pwd").value;
    if(p=="123456"){
        document.getElementById("mainPage").style.display="none";
        document.getElementById("secretPage").style.display="block";
        // 关键：一进来立刻加载日记列表
        loadDiaryList();
    }else{
        alert("密码错误");
    }
}

function backMain(){
    document.getElementById("secretPage").style.display="none";
    document.getElementById("mainPage").style.display="block";
    document.getElementById("pwd").value="";
}

function loadDiaryList(){
    let sel = document.getElementById("diarySelect");
    sel.innerHTML = '<option value="">请选择日记查看</option>';
    let list = JSON.parse(localStorage.getItem("diaryList") || "[]");
    for(let i=0;i<list.length;i++){
        let opt = document.createElement("option");
        opt.value = i;
        opt.innerText = "秘密日记"+(i+1);
        sel.appendChild(opt);
    }
}

function newDiary(){
    document.getElementById("diary").value = "";
    nowId = -1;
    document.getElementById("diarySelect").value = "";
}

function switchDiary(){
    let idx = document.getElementById("diarySelect").value;
    if(idx === "") return;
    nowId = parseInt(idx);
    let list = JSON.parse(localStorage.getItem("diaryList") || "[]");
    document.getElementById("diary").value = list[nowId];
}

function saveCurrentDiary(){
    let txt = document.getElementById("diary").value;
    let list = JSON.parse(localStorage.getItem("diaryList") || "[]");

    if(nowId >= 0){
        list[nowId] = txt;
    }else{
        list.push(txt);
        nowId = list.length - 1;
    }

    localStorage.setItem("diaryList",JSON.stringify(list));
    // 保存完立刻刷新下拉列表
    loadDiaryList();
    alert("保存成功！");
}
</script>

</body>
</html>
