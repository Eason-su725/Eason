<!DOCTYPE html>
<html>
<head>
    <title>我的普通小网站</title>
    <style>
        body {
            background-color: #f5f5f5; 
            font-family: 微软雅黑, sans-serif; 
            margin: 0;
            padding: 50px;
            text-align: center;
        }
        .box {
            background: white; 
            padding: 30px;
            border-radius: 10px; 
            box-shadow: 0 0 10px #ddd; 
            max-width: 600px;
            margin: 0 auto 20px;
        }
        h1 {
            color: #333;
            font-size: 28px;
        }
        p {
            color: #666;
            font-size: 16px;
            line-height: 1.6;
        }
        textarea {
            width: 500px; 
            height: 300px; 
            font-size: 18px;
        }
        #pwd{
            padding:12px;
            width:260px;
            font-size:18px;
            margin-right:10px;
        }
        button{
            padding:10px 18px;
            font-size:16px;
            cursor:pointer;
            margin:3px;
        }
        select{
            padding:8px;
            font-size:16px;
            width:220px;
        }
        #secretPage{
            display:none;
        }
    </style>
</head>
<body>

<div id="mainPage">
    <div class="box">
        <h1>欢迎来到我的网站！</h1>
        <p>这是我做的第一个网站。</p>
        <p>你可以在这里写任何你想写的话，比如你的爱好、你的日常。</p>
    </div>

    <div class="box">
        <textarea placeholder="你在这里可以打字"></textarea>
    </div>

    <div class="box">
        <p>输入密码进入秘密网页</p>
        <input type="password" id="pwd" placeholder="请输入密码">
        <button onclick="showPwd()">显示/隐藏</button>
        <button onclick="checkPwd()">进入秘密页</button>
    </div>
</div>

<div id="secretPage">
    <div class="box">
        <h1>🔐 秘密文件空间</h1>
        <p>可以创建多个文件，保存内容，随时打开查看</p>
        <br>
        <select id="fileSelect" onchange="openFile()">
            <option value="">请选择文件</option>
        </select>
        <br><br>
        <button onclick="newFile()">新建空白文件</button>
    </div>

    <div class="box">
        <textarea id="content" placeholder="在这里写文件内容"></textarea>
    </div>

    <div class="box">
        <button onclick="saveFile()">保存文件</button>
        <button onclick="backMain()">退出返回第一个网站</button>
    </div>
</div>

<script>
let currentFileIndex = -1;

function showPwd(){
    let i=document.getElementById("pwd");
    i.type=i.type=="password"?"text":"password";
}

function checkPwd(){
    let p=document.getElementById("pwd").value;
    if(p=="123456"){
        document.getElementById("mainPage").style.display="none";
        document.getElementById("secretPage").style.display="block";
        loadFileList();
    }else{
        alert("密码错误");
    }
}

function backMain(){
    document.getElementById("secretPage").style.display="none";
    document.getElementById("mainPage").style.display="block";
    document.getElementById("pwd").value="";
}

function loadFileList(){
    let sel = document.getElementById("fileSelect");
    sel.innerHTML = '<option value="">请选择文件</option>';
    let files = JSON.parse(localStorage.getItem("myFiles") || "[]");
    
    for(let i=0;i<files.length;i++){
        let opt = document.createElement("option");
        opt.value = i;
        opt.innerText = "文件 " + (i+1);
        sel.appendChild(opt);
    }
}

function newFile(){
    document.getElementById("content").value = "";
    currentFileIndex = -1;
    document.getElementById("fileSelect").value = "";
}

function openFile(){
    let index = document.getElementById("fileSelect").value;
    if(index === "") return;
    currentFileIndex = parseInt(index);
    let files = JSON.parse(localStorage.getItem("myFiles") || "[]");
    document.getElementById("content").value = files[currentFileIndex];
}

function saveFile(){
    let text = document.getElementById("content").value;
    let files = JSON.parse(localStorage.getItem("myFiles") || "[]");
    
    if(currentFileIndex >= 0){
        files[currentFileIndex] = text;
    }else{
        files.push(text);
        currentFileIndex = files.length - 1;
    }
    
    localStorage.setItem("myFiles", JSON.stringify(files));
    loadFileList();
    alert("文件保存成功！");
}
</script>

</body>
</html>
