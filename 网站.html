<!DOCTYPE html>
<html>
<head>
    <title>我的普通小网站</title>
    <style>
        body {
            background-color: #f5f5f5; 
            font-family: 微软雅黑, sans-serif; 
            margin: 0;
            padding: 50px;
            text-align: center;
        }
        .box {
            background: white; 
            padding: 30px;
            border-radius: 10px; 
            box-shadow: 0 0 10px #ddd; 
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            color: #333;
            font-size: 28px;
        }
        p {
            color: #666;
            font-size: 16px;
            line-height: 1.6; 
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>欢迎来到我的网站！</h1>
        <p>这是我做的第一个网站，普普通通的，但是很干净清爽~</p>
        <p>你可以在这里写任何你想写的话，比如你的爱好、你的日常，或者随便什么。</p>
    </div>
</body>
</html>
